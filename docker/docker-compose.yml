version: "3.9"

services:
  backend:
    image: golang:1.25
    container_name: agdm-backend
    working_dir: /app
    command: sh -c "go mod download && go run ./cmd/server"
    volumes:
      - ..:/app
    environment:
      APP_DEMO_MODE: "true"
      APP_JWT_SECRET: "dev-secret"
      APP_SQLITE_PATH: "/app/data/agdm.db"
    ports:
      - "8080:8080"

  frontend:
    image: node:22
    container_name: agdm-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ..:/app
    environment:
      VITE_API_BASE_URL: "http://localhost:8080/api/v1"
    ports:
      - "5173:5173"
    depends_on:
      - backend
