openapi: 3.0.3
info:
  title: AG Directory Manager API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      summary: LDAP login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
  /dashboard:
    get:
      security:
        - bearerAuth: []
      summary: Dashboard counters
      responses:
        '200':
          description: Dashboard snapshot
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
